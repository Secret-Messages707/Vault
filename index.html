<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Hamoudi Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 2px solid var(--primary); border-radius: 25px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 0 20px var(--primary); text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: #fff; box-sizing: border-box; }
        button { background: var(--primary); color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #appContent { display: none; }
        .activation-box { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="titleText">🔒 تفعيل الوصول</h2>
        
        <div id="activationArea">
            <p style="font-size: 14px;">أدخل كود التفعيل الذي حصلت عليه من المتجر</p>
            <input type="text" id="licenseKey" placeholder="XX-XXXX-XXXX">
            <button onclick="checkLicense()">تفعيل الآن</button>
            <p id="errorMsg" style="color: #ff4b4b; font-size: 12px; margin-top: 10px;"></p>
        </div>

        <div id="appContent">
            <p>رصيد المحاولات المتبقي: <b id="counter">2</b></p>
            <select id="theme"><option value="romantic">ثيم حب ❤️</option><option value="friend">ثيم صداقة 🤝</option></select>
            <input type="text" id="senderName" placeholder="اسم المرسل">
            <textarea id="msg" placeholder="اكتب رسالتك السرية هنا..."></textarea>
            <label style="font-size: 12px; display: block; margin-top: 10px;">متى تفتح الرسالة؟</label>
            <input type="datetime-local" id="unlockTime">
            <button onclick="generateVault()">إنشاء QR Code</button>
            <div id="qrcode" style="background: white; padding: 10px; margin-top: 20px; display: none; justify-content: center; border-radius: 10px;"></div>
        </div>
    </div>

<script>
    // نظام الأكواد الـ 1000 (تم اختصار العرض هنا للسهولة ولكن الكود يعمل بالنمط)
    // لتوليد 1000 كود في ثوانٍ، سنستخدم مصفوفة ذكية:
    const prefix = "HM-";
    const keysCount = 1000;
    const validKeys = [];

    // توليد الأكواد (هذه المعادلة تولد 1000 كود تبدأ من HM-1001 إلى HM-2000)
    for(let i=1001; i<=2000; i++) {
        validKeys.push(prefix + i + "-VAULT");
    }

    function checkLicense() {
        const input = document.getElementById('licenseKey').value.trim().toUpperCase();
        if (validKeys.includes(input)) {
            localStorage.setItem('vault_access_granted', 'true');
            showApp();
        } else {
            document.getElementById('errorMsg').innerText = "الكود غير صحيح!";
        }
    }

    function showApp() {
        document.getElementById('activationArea').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        document.getElementById('titleText').innerText = "⚙️ لوحة التحكم";
    }

    if(localStorage.getItem('vault_access_granted') === 'true') showApp();

    function generateVault() {
        let remaining = localStorage.getItem('user_credit') || 2;
        if(remaining <= 0) { alert("انتهى رصيدك"); return; }
        
        const sender = encodeURIComponent(document.getElementById('senderName').value);
        const msg = btoa(unescape(encodeURIComponent(document.getElementById('msg').value)));
        const time = new Date(document.getElementById('unlockTime').value).getTime();
        const theme = document.getElementById('theme').value;

        const finalURL = `https://secret-messages707.github.io/Vault/view.html?d=${msg}&t=${time}&n=${sender}&s=${theme}`; 
        
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = ""; qrContainer.style.display = "flex";
        new QRCode(qrContainer, { text: finalURL, width: 160, height: 160 });

        remaining--;
        localStorage.setItem('user_credit', remaining);
        document.getElementById('counter').innerText = remaining;
    }
</script>
</body>
</html>
