<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الرسالة السرية | Hamoudi Vault</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; }
        body { 
            background: var(--bg); color: #fff; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }

        /* --- الهويات (Themes) المتطابقة --- */
        .theme-romantic { --primary: #ff4bb4; background-image: radial-gradient(circle, #4b0d1d 0%, #0a0a0a 100%); }
        .theme-friend { --primary: #00d2ff; background-image: radial-gradient(circle, #0d253f 0%, #050a15 100%); }
        .theme-family { --primary: #ff9f43; background-image: radial-gradient(circle, #3d2610 0%, #0a0a0a 100%); }
        .theme-others { --primary: #d4af37; background-image: radial-gradient(circle, #2c240a 0%, #050505 100%); }

        .card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 2px solid var(--primary); border-radius: 25px; padding: 30px; 
            width: 100%; max-width: 400px; box-shadow: 0 0 20px var(--primary); text-align: center;
        }
        .msg-box { 
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; 
            margin: 20px 0; border: 1px solid var(--primary); min-height: 100px;
            white-space: pre-wrap; word-wrap: break-word; line-height: 1.6;
        }
        .sender-tag { color: var(--primary); font-weight: bold; font-size: 1.2rem; }
        .timer { font-size: 0.9rem; color: #aaa; margin-top: 10px; }
        
        /* الزر الجديد (صغير ومخفي في البداية)[span_2](start_span)[span_2](end_span) */
        #marketingBtn {
            display: none; /* يظهر فقط بعد الفتح[span_3](start_span)[span_3](end_span) */
            margin-top: 25px; padding: 8px 15px;
            background: transparent; border: 1px solid var(--primary);
            color: var(--primary); text-decoration: none; border-radius: 20px;
            font-size: 12px; font-weight: normal; transition: 0.3s;
            opacity: 0.8;
        }
        #marketingBtn:hover { background: var(--primary); color: #000; opacity: 1; }
    </style>
</head>
<body id="viewBody">

    <div class="card" id="lockCard">
        <h2 id="headerTitle">🔒 رسالة محمية</h2>
        <div id="contentArea">
            <p id="countdown" class="timer">جاري التحقق من وقت الفتح...</p>
        </div>
        
        <!-- الزر المحدث حسب طلبك[span_4](start_span)[span_4](end_span) -->
        <a id="marketingBtn" href="https://secret-messages707.github.io/Vault/index_3.html">
            تبغى ترسل رسالة مشفرة مثل كذا ؟ ✨
        </a>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const d = urlParams.get('d'); 
    const t = urlParams.get('t'); 
    const s = urlParams.get('s'); 
    const n = urlParams.get('n'); 

    if(s && s !== 'default') {
        document.body.className = 'theme-' + s;
    }

    function update() {
        const now = new Date().getTime();
        const diff = t - now;

        if (diff <= 0) {
            const decodedMsg = decodeURIComponent(escape(atob(d)));
            const decodedSender = decodeURIComponent(escape(atob(n)));
            
            document.getElementById('headerTitle').innerText = "تم فتح الرسالة ✅";
            document.getElementById('contentArea').innerHTML = `
                <p>مرسلة من: <span class="sender-tag">${decodedSender}</span></p>
                <div class="msg-box">${decodedMsg}</div>
            `;
            
            // إظهار الزر الصغير بعد فتح الرسالة[span_5](start_span)[span_5](end_span)
            document.getElementById('marketingBtn').style.display = 'inline-block';
            return;
        }

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById('countdown').innerText = `ستفتح الرسالة بعد: ${hours}س ${mins}د ${secs}ث`;
    }

    if(d && t && n) {
        setInterval(update, 1000);
        update();
    } else {
        document.getElementById('contentArea').innerHTML = "<p>رابط غير صالح!</p>";
    }
</script>
</body>
</html>
